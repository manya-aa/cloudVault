version: "3.8"

services:

  redis:
    image: redis:7
    container_name: cloudinventory-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: cloudinventory-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://cloudinventory.ctocwskoo2zo.ap-south-1.rds.amazonaws.com:5432/cloudinventory
      DB_USER: postgres
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      REDIS_PORT: 6379