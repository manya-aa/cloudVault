version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: cloudinventory-db
    environment:
      POSTGRES_DB: cloudinventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cloudinventory-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: cloudinventory-app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cloudinventory
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  pgdata: