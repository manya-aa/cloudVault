spring.application.name=cloudInventory

# Connection URL (Default PostgreSQL local port is 5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/cloudVault
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA Configuration
# 'update' automatically updates your database schema based on Java entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
